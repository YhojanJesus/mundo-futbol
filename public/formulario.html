<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Únete al Equipo</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header class="header-principal">
    <h1>⚽ MUNDO FÚTBOL</h1>
    <nav class="navegacion-principal">
        <ul>
            <li><a href="index.html">INICIO</a></li>
            <li><a href="tabla.html">TABLA</a></li>
            <li><a href="formulario.html" class="activo">FORMULARIO</a></li>
            <li><a href="multimedia.html">MULTIMEDIA</a></li>
            <li><a href="crud-completo.html">CRUD</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <div class="formulario-moderno">
        <h2>📝 Registro de Jugador</h2>
        <p style="color: white; margin-bottom: 20px; opacity: 0.9;">📌 Los datos se guardarán en MongoDB Atlas</p>
        
        <form id="formularioRegistro" method="post" enctype="multipart/form-data">
            <div id="erroresFormulario" style="display: none; padding: 12px; border-radius: 10px; margin-bottom: 20px;"></div>
            
            <div class="grupo-campo">
                <label>Nombre Completo <span class="required">*</span></label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Lionel Messi" required>
            </div>

            <div class="grupo-campo">
                <label>Correo Electrónico <span class="required">*</span></label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">
            </div>

            <div class="grupo-campo">
                <label>Teléfono</label>
                <input type="tel" id="tel" name="telefono" placeholder="+56 9 1234 5678">
            </div>

            <div class="grupo-campo">
                <label>Posición Favorita</label>
                <div class="radio-group">
                    <label><input type="radio" name="posicion" value="Delantero"> ⚡ Delantero</label>
                    <label><input type="radio" name="posicion" value="Portero"> 🧤 Portero</label>
                    <label><input type="radio" name="posicion" value="Defensa"> 🛡️ Defensa</label>
                    <label><input type="radio" name="posicion" value="Mediocampista"> 🎯 Mediocampista</label>
                </div>
            </div>

            <div class="checkbox-campo">
                <input type="checkbox" id="seguro" name="seguro">
                <label>✅ Cuento con seguro médico</label>
            </div>

            <div class="grupo-campo">
                <label>Foto de carnet</label>
                <input type="file" id="foto" name="foto" accept="image/*">
            </div>

            <div class="grupo-campo">
                <label>Categoría</label>
                <select id="categoria" name="categoria">
                    <option value="infantil">👶 Infantil</option>
                    <option value="juvenil">🧒 Juvenil</option>
                    <option value="senior">👨 Senior</option>
                </select>
            </div>

            <div class="grupo-campo">
                <label>Experiencia en el fútbol <span class="required">*</span></label>
                <textarea id="mensaje" name="mensaje" rows="4" placeholder="Cuéntanos tu experiencia..."></textarea>
            </div>

            <button type="submit" class="btn-enviar">📤 Enviar Registro</button>
        </form>
    </div>
</div>

<footer class="pie-pagina">
    <p>&copy; 2026 Portal de Fútbol - Registro de Jugadores</p>
    <p>⚽ La pasión que nos une ⚽</p>
</footer>

<button id="btnModoOscuro" class="boton-modo">🌙</button>
<button id="btnVolverArriba">⬆️</button>

<script src="js/app.js"></script>
</body>
</html>
